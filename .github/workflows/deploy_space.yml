name: Deploy API to HF Space

# Optional: pushes the repo to a Hugging Face Docker Space. Requires secrets
# HF_TOKEN and vars HF_SPACE_ID (e.g. "username/paperfeed-api").
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.HF_SPACE_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Space payload
        run: |
          # HF Docker Spaces build from a root Dockerfile; ours already assumes
          # a repo-root build context, so promote it and add Space metadata.
          cp services/api/Dockerfile Dockerfile
          cat > README.md <<'EOF'
          ---
          title: PaperFeed API
          emoji: 📄
          colorFrom: indigo
          colorTo: blue
          sdk: docker
          app_port: 7860
          ---
          PaperFeed online recommendation API. See the GitHub repo for source.
          EOF

      - name: Push to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "deploy: $GITHUB_SHA"
          git push --force "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" HEAD:main
