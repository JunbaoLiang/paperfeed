name: Weekly training

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-train
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MLFLOW_S3_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra pipelines

      - name: Build dataset
        run: uv run python -m pipelines.build_dataset

      - name: Train (skips below 2000 samples)
        run: uv run python -m pipelines.train

      - name: Evaluate & register staging
        run: uv run python -m pipelines.evaluate

      - name: Interleaving judgment
        run: uv run python -m pipelines.promote

      - name: Upload interleaving report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interleave-report
          path: data/interleave_report.md
          if-no-files-found: ignore
