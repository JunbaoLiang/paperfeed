# Render Blueprint — free-tier Docker web service for the online API.
# ADR A3 revised: HF Spaces dropped free Docker Spaces (PRO-only, 2026-07),
# Render free tier replaces it. Free instances sleep after 15 min idle;
# first request after that takes ~1 min (acceptable, single-user).
services:
  - type: web
    name: paperfeed-api
    runtime: docker
    plan: free
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true # redeploy on push to main
    envVars:
      - key: DATABASE_URL
        sync: false # fill in the Render dashboard, never committed
      - key: API_TOKEN
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
